[build]
builder = "nixpacks"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "mkdir -p /root/.openfang/agents/shark-commander /root/.openfang/prompts && cp config.toml /root/.openfang/ && cp -r agents/shark-commander /root/.openfang/agents/ && cp -r prompts /root/.openfang/ && OPENFANG_HOME=/data /app/bin/openfang start"
healthcheckPath = "/"
healthcheckTimeout = 300
